spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

app:
  jwt:
    secret: "test-secret-key-for-unit-tests-only-minimum-32-characters"
    expiration-ms: 3600000
    refresh-expiration-ms: 7200000
  upload:
    base-dir: /tmp/test-uploads
    allowed-extensions: txt,pdf,doc,docx,xls,xlsx,jpg,png
    max-size-bytes: 10485760
  cors:
    allowed-origins: "http://localhost:3000"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    max-age: 3600

# Test-only seed credentials — not production secrets.
# Externalised here so source files stay credential-free (suppresses secret-scanner noise).
test:
  seed:
    admin-username: admin
    admin-password: admin123

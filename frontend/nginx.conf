# =============================================================
# Nginx configuration — SPA server + API reverse proxy
#
# Served by: frontend container (nginx:1.27-alpine)
# Frontend: React SPA at /usr/share/nginx/html
# Backend:  Spring Boot at http://backend:8080  (context /api)
#
# Rate limiting zones (http context — this file is included
# inside the default http{} block of nginx:1.27-alpine):
#
#   auth_limit  — 5 req/min per IP for auth endpoints
#                 (login, register, refresh).  Burst of 5
#                 absorbs brief spikes; nodelay returns 429
#                 immediately once burst is exhausted.
# =============================================================

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS resolver.
    # Using a variable for proxy_pass defers hostname resolution to runtime,
    # so Nginx starts cleanly even if the backend container is momentarily
    # unavailable and handles backend restarts without needing nginx reload.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ---- Compression ------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- Static asset caching ---------------------------------------
    # Vite hashes asset filenames → safe to cache for 1 year
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- Auth endpoint rate limiting --------------------------------
    # Applies to login, register, and refresh token endpoints.
    # Limit: 5 requests/minute per IP (burst=5, nodelay).
    # Exceeding the limit returns HTTP 429 Too Many Requests.
    # This location is more specific than /api/ so nginx matches it first.
    location ~ ^/api/auth/(login|register|refresh) {
        limit_req       zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        set $backend_upstream http://backend:8080;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ---- API reverse proxy ------------------------------------------
    # The backend uses context-path /api, so the prefix is preserved.
    # No rewrite needed: GET /api/users → http://backend:8080/api/users
    location /api/ {
        set $backend_upstream http://backend:8080;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts — generous for Excel export / large file uploads
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Must match Spring Boot multipart limit (100 MB)
        client_max_body_size 100m;
    }

    # ---- Actuator health endpoint -----------------------------------
    # Exposed as a public liveness/readiness probe path.
    # Rewrite /actuator/* → /api/actuator/* before proxying so the
    # context-path prefix is added. Cannot use proxy_pass $var/path
    # because nginx drops the sub-path when a variable is in proxy_pass.
    location /actuator/ {
        set $backend_upstream http://backend:8080;
        rewrite ^/actuator/(.*)$ /api/actuator/$1 break;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- SPA fallback -----------------------------------------------
    # All non-file paths serve index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Security headers -------------------------------------------
    # Content-Security-Policy: React SPA served from same origin.
    # - script-src 'self'          — Vite hashes all JS bundles; no inline scripts
    # - style-src 'self' 'unsafe-inline' — Ant Design v5 injects CSS-in-JS <style> tags
    # - img-src 'self' data: blob: — data URIs used by Ant Design icons; blob: for previews
    # - font-src 'self' data:      — Ant Design embeds fonts as data URIs
    # - connect-src 'self'         — XHR/fetch only to same origin (via /api/ proxy)
    # - frame-ancestors 'self'     — equivalent to X-Frame-Options SAMEORIGIN
    # - object-src 'none'          — disallow Flash / plugins
    # - base-uri 'self'            — prevent base tag injection
    # - form-action 'self'         — prevent form hijacking to external sites
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
        always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
}
